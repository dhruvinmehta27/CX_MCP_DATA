---
applications:
  - name: cx-dashboard-api
    memory: 1024M
    buildpacks:
      - nodejs_buildpack
    path: .
    command: node src/server.js
    services:
      - cx-destination
      - cx-xsuaa-mcp
    env:
      NODE_ENV: production
      C4C_DESTINATION: C4C_QUA_OBO
      DASHBOARD_APP_ORIGIN: https://cx-dashboard-app.cfapps.eu10.hana.ondemand.com
# Secrets — never in this file. Set via:
#   cf set-env cx-dashboard-api ANTHROPIC_API_KEY <key>
#   cf set-env cx-dashboard-api INLINE_API_KEY <key>   # Copilot Studio inline auth
#   cf restage cx-dashboard-api
